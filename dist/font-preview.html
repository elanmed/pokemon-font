<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon Font Preview</title>
<style>
  @font-face {
    font-family: "Pokemon 151";
    src: url("Pokemon 151.ttf") format("truetype");
  }

  body {
    background: #1e1e1e;
    color: #eeeeee;
    font-family: sans-serif;
    padding: 24px;
  }

  .glyphGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 16px 12px;
  }

  .glyphCell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .glyphCharacter {
    font-family: "Pokemon 151", sans-serif;
    font-size: 48px;
    line-height: 64px;
    height: 64px;
  }

  .comparisonCharacter {
    font-family: sans-serif;
    font-size: 48px;
    line-height: 64px;
    height: 64px;
  }

  .glyphLabel {
    font-size: 10px;
    color: #888888;
  }
</style>
</head>
<body>
<h1>Pokemon 151 Font Preview</h1>
<p>Place this file in the same folder as "Pokemon 151.ttf" and open it in Chrome or Safari.</p>
<p>Each cell shows the emoji glyph on top and the same character rendered in a normal sans-serif font below, for size comparison.</p>
<div class="glyphGrid" id="glyphGrid"></div>
<script>
  const privateUseAreaStart = 0x100000;
  const totalGlyphCount = 151;
  const glyphGridElement = document.getElementById("glyphGrid");

  for (let glyphIndex = 0; glyphIndex < totalGlyphCount; glyphIndex++) {
    const codepoint = privateUseAreaStart + glyphIndex;
    const character = String.fromCodePoint(codepoint);

    const glyphCellElement = document.createElement("div");
    glyphCellElement.className = "glyphCell";

    const glyphCharacterElement = document.createElement("div");
    glyphCharacterElement.className = "glyphCharacter";
    glyphCharacterElement.textContent = character;

    const comparisonCharacterElement = document.createElement("div");
    comparisonCharacterElement.className = "comparisonCharacter";
    comparisonCharacterElement.textContent = "Aa";

    const glyphLabelElement = document.createElement("div");
    glyphLabelElement.className = "glyphLabel";
    glyphLabelElement.textContent = codepoint.toString(16);

    glyphCellElement.appendChild(glyphCharacterElement);
    glyphCellElement.appendChild(comparisonCharacterElement);
    glyphCellElement.appendChild(glyphLabelElement);
    glyphGridElement.appendChild(glyphCellElement);
  }
</script>
</body>
</html>
